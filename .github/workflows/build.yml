name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-arch-full:
    name: Arch Linux (Wayland + X11)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Update system and install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git meson ninja wayland wayland-protocols \
            egl-wayland mesa libpng libjpeg-turbo libx11 libxrandr

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build
        run: meson setup build

      - name: Build
        run: ninja -C build

      - name: Run unit tests
        run: meson test -C build --print-errorlogs

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version
          ./build/neowall --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neowall-arch-full
          path: build/neowall

  build-arch-wayland-only:
    name: Arch Linux (Wayland only)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Update system and install dependencies (no X11)
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git meson ninja wayland wayland-protocols \
            egl-wayland mesa libpng libjpeg-turbo

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build (Wayland only)
        run: meson setup build -Dx11_backend=disabled

      - name: Build
        run: ninja -C build

      - name: Verify build configuration
        run: |
          meson configure build | grep -E "wayland_backend|x11_backend"

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version

  build-arch-x11-only:
    name: Arch Linux (X11 only)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Update system and install dependencies (no Wayland)
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git meson ninja mesa libpng libjpeg-turbo \
            libx11 libxrandr

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build (X11 only)
        run: meson setup build -Dwayland_backend=disabled

      - name: Build
        run: ninja -C build

      - name: Verify build configuration
        run: |
          meson configure build | grep -E "wayland_backend|x11_backend"

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version

  build-debian-full:
    name: Debian (Wayland + X11)
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential git pkg-config meson ninja-build \
            libwayland-dev wayland-protocols libwayland-egl1-mesa \
            libx11-dev libxrandr-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libpng-dev libjpeg-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build
        run: meson setup build

      - name: Build
        run: ninja -C build

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neowall-debian-full
          path: build/neowall

  build-debian-x11-only:
    name: Debian (X11 only - i3 style)
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Install dependencies (pure X11, no Wayland)
        run: |
          apt-get update
          apt-get install -y build-essential git pkg-config meson ninja-build \
            libx11-dev libxrandr-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libpng-dev libjpeg-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build (X11 only)
        run: meson setup build -Dwayland_backend=disabled

      - name: Build
        run: ninja -C build

      - name: Verify build configuration
        run: |
          meson configure build | grep -E "wayland_backend|x11_backend"

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version

  build-ubuntu:
    name: Ubuntu (Wayland + X11)
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git pkg-config meson ninja-build \
            libwayland-dev wayland-protocols libwayland-egl1-mesa \
            libx11-dev libxrandr-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libpng-dev libjpeg-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build
        run: meson setup build

      - name: Build
        run: ninja -C build

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version
          ./build/neowall --help

      - name: Test install
        run: |
          DESTDIR=/tmp/neowall-test ninja -C build install
          test -f /tmp/neowall-test/usr/local/bin/neowall
          test -d /tmp/neowall-test/usr/local/share/neowall/shaders
          test -f /tmp/neowall-test/usr/local/share/neowall/config.vibe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neowall-ubuntu
          path: build/neowall

  x11-multimonitor-smoke:
    name: X11 multi-monitor smoke test (Xvfb)
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git pkg-config meson ninja-build \
            libx11-dev libxrandr-dev \
            libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dri \
            libpng-dev libjpeg-dev \
            xvfb x11-xserver-utils

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build (X11 only)
        run: |
          meson setup build -Dwayland_backend=disabled
          ninja -C build

      # Boot a headless X server, carve the single virtual screen into two
      # logical monitors with xrandr --setmonitor (the same RandR 1.5 path
      # neowall enumerates), run neowall briefly with software GL, and assert
      # it detected BOTH monitors. Regression guard for issue #44.
      - name: Run under Xvfb with a faked dual-head layout
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 3840x1200x24 +extension RANDR &
          XVFB_PID=$!
          sleep 2

          # Split the 3840x1200 root into two 1920x1200 logical monitors,
          # mirroring the reporter's layout (DVI-D-0 at +0+0, VGA-0 at +1920+0).
          xrandr --setmonitor NEO-LEFT  1920/600x1200/340+0+0    none
          xrandr --setmonitor NEO-RIGHT 1920/600x1200/340+1920+0 none
          xrandr --listmonitors

          # Run for a couple of seconds, capturing verbose logs.
          timeout 5s ./build/neowall -f -v > neowall.log 2>&1 || true
          kill $XVFB_PID 2>/dev/null || true

          echo '----- neowall.log -----'
          cat neowall.log

          echo '----- assertions -----'
          grep -q 'X11: detected 2 monitor(s)' neowall.log \
            || { echo 'FAIL: did not detect 2 monitors'; exit 1; }
          grep -q 'NEO-LEFT'  neowall.log || { echo 'FAIL: NEO-LEFT not enumerated';  exit 1; }
          grep -q 'NEO-RIGHT' neowall.log || { echo 'FAIL: NEO-RIGHT not enumerated'; exit 1; }
          echo 'PASS: both monitors detected with their RandR names'

