name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    name: macOS (AppKit + CGL)
    runs-on: macos-14
    steps:
      - name: Install dependencies
        run: brew install meson ninja libpng jpeg-turbo

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build
        run: meson setup build

      - name: Build
        run: ninja -C build

      - name: Smoke test (version + help)
        run: |
          ./build/neowall --version
          ./build/neowall --help

  build-arch-full:
    name: Arch Linux (Wayland + X11)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Update system and install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git meson ninja wayland wayland-protocols \
            egl-wayland mesa libpng libjpeg-turbo libx11 libxrandr

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build
        run: meson setup build

      - name: Build
        run: ninja -C build

      - name: Run unit tests
        run: meson test -C build --print-errorlogs

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version
          ./build/neowall --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neowall-arch-full
          path: build/neowall

  build-arch-wayland-only:
    name: Arch Linux (Wayland only)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Update system and install dependencies (no X11)
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git meson ninja wayland wayland-protocols \
            egl-wayland mesa libpng libjpeg-turbo

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build (Wayland only)
        run: meson setup build -Dx11_backend=disabled

      - name: Build
        run: ninja -C build

      - name: Verify build configuration
        run: |
          meson configure build | grep -E "wayland_backend|x11_backend"

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version

  build-arch-x11-only:
    name: Arch Linux (X11 only)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Update system and install dependencies (no Wayland)
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git meson ninja mesa libpng libjpeg-turbo \
            libx11 libxrandr

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build (X11 only)
        run: meson setup build -Dwayland_backend=disabled

      - name: Build
        run: ninja -C build

      - name: Verify build configuration
        run: |
          meson configure build | grep -E "wayland_backend|x11_backend"

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version

  build-debian-full:
    name: Debian (Wayland + X11)
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential git pkg-config meson ninja-build \
            libwayland-dev wayland-protocols libwayland-egl1-mesa \
            libx11-dev libxrandr-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libpng-dev libjpeg-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build
        run: meson setup build

      - name: Build
        run: ninja -C build

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neowall-debian-full
          path: build/neowall

  build-debian-x11-only:
    name: Debian (X11 only - i3 style)
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Install dependencies (pure X11, no Wayland)
        run: |
          apt-get update
          apt-get install -y build-essential git pkg-config meson ninja-build \
            libx11-dev libxrandr-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libpng-dev libjpeg-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build (X11 only)
        run: meson setup build -Dwayland_backend=disabled

      - name: Build
        run: ninja -C build

      - name: Verify build configuration
        run: |
          meson configure build | grep -E "wayland_backend|x11_backend"

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version

  build-ubuntu:
    name: Ubuntu (Wayland + X11)
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git pkg-config meson ninja-build \
            libwayland-dev wayland-protocols libwayland-egl1-mesa \
            libx11-dev libxrandr-dev \
            libegl1-mesa-dev libgles2-mesa-dev \
            libpng-dev libjpeg-dev

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build
        run: meson setup build

      - name: Build
        run: ninja -C build

      - name: Check binary
        run: |
          test -f build/neowall
          ./build/neowall --version
          ./build/neowall --help

      - name: Test install
        run: |
          DESTDIR=/tmp/neowall-test ninja -C build install
          test -f /tmp/neowall-test/usr/local/bin/neowall
          test -d /tmp/neowall-test/usr/local/share/neowall/shaders
          test -f /tmp/neowall-test/usr/local/share/neowall/config.vibe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neowall-ubuntu
          path: build/neowall

  x11-multimonitor-smoke:
    name: X11 RandR-monitor smoke test (Xvfb)
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git pkg-config meson ninja-build \
            libx11-dev libxrandr-dev \
            libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dri \
            libpng-dev libjpeg-dev \
            xvfb x11-xserver-utils

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build (X11 only)
        run: |
          meson setup build -Dwayland_backend=disabled
          ninja -C build

      # Boot a headless X server and try to bind a custom-named RandR 1.5
      # monitor to the real screen output, then run neowall briefly with
      # software GL and assert it enumerates the monitor via the RandR path.
      #
      # NOTE: Xvfb exposes a single CRTC/output, so a genuine dual-head layout
      # cannot be faked here — `xrandr --setmonitor ... none` creates an
      # output-less monitor that XRRGetMonitors(only_active=True) (correctly)
      # drops. We try to rename the active monitor and, IF Xvfb's RandR honours
      # it (it is inconsistent across versions), additionally assert neowall
      # logged that custom name. The always-on guard is that neowall boots on
      # X11 and enumerates the monitor through XRRGetMonitors — the core
      # enumeration regression behind issue #44.
      - name: Run under Xvfb against a RandR monitor
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 3840x1200x24 +extension RANDR &
          XVFB_PID=$!
          sleep 2

          # Discover the real output name Xvfb presents (e.g. "screen").
          OUTPUT=$(xrandr --query | awk '/ connected/{print $1; exit} / disconnected/{print $1; exit}')
          [ -n "$OUTPUT" ] || OUTPUT=$(xrandr --query | awk 'NR==2{print $1}')
          echo "using output: $OUTPUT"

          # Try to bind a custom-named RandR 1.5 monitor to the real output.
          # Xvfb may reject this; capture whether it actually took effect.
          xrandr --setmonitor NEO-HEAD "3840/1016x1200/317+0+0" "$OUTPUT" || true
          echo '----- xrandr --listmonitors -----'
          xrandr --listmonitors
          NAMED=0
          if xrandr --listmonitors | grep -q 'NEO-HEAD'; then NAMED=1; fi
          echo "named monitor honoured by Xvfb RandR: $NAMED"

          # Run for a couple of seconds, capturing verbose logs.
          timeout 5s ./build/neowall -f -v > neowall.log 2>&1 || true
          kill $XVFB_PID 2>/dev/null || true

          echo '----- neowall.log -----'
          cat neowall.log

          echo '----- assertions -----'
          # Always-on guard: neowall enumerated a monitor via the RandR path.
          grep -q 'X11: detected [1-9][0-9]* monitor(s)' neowall.log \
            || { echo 'FAIL: no monitors detected'; exit 1; }
          grep -q '  monitor ' neowall.log \
            || { echo 'FAIL: no monitor enumerated'; exit 1; }
          # Conditional guard: only when Xvfb honoured the rename do we require
          # neowall to surface that exact RandR-1.5 connector name.
          if [ "$NAMED" = 1 ]; then
            grep -q 'NEO-HEAD' neowall.log \
              || { echo 'FAIL: Xvfb exposed NEO-HEAD but neowall did not enumerate it'; exit 1; }
            echo 'PASS: neowall enumerated the named RandR 1.5 monitor'
          else
            echo 'PASS: neowall enumerated the RandR monitor (Xvfb did not honour custom name)'
          fi

